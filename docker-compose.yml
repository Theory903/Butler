services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://butler:butler@db:5432/butler
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=dev-secret-key
    depends_on:
      - db
      - cache
    volumes:
      - ./backend:/app/backend
    command: /app/backend/scripts/start-api.sh

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: butler
      POSTGRES_PASSWORD: butler
      POSTGRES_DB: butler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5.12-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/butler-dev
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/storage

  app:
    profiles:
      - frontend
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./app:/app
      - /app/node_modules
      - /app/node_modules/@expo
    command: npx expo start -- --tunnel

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
