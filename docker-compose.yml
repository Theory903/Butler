name: butler

x-logging-dev: &logging-dev
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

x-logging-prod: &logging-prod
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "butler|{{.Name}}|{{.ID}}"

x-restart: &restart
  restart: unless-stopped

x-healthcheck-defaults: &hc-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 20s

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://butler:${POSTGRES_PASSWORD:-butler}@db:5432/butler
  REDIS_URL: redis://cache:6379
  NEO4J_URL: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-butler-dev}
  QDRANT_URL: http://qdrant:6333
  SEARXNG_URL: http://searxng:8080
  REDPANDA_URL: PLAINTEXT://redpanda:9092
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
  ORT_LOGGING_LEVEL: "3"
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-gemma-4-26b-a4b-it}
  LONG_CONTEXT_MODEL: ${LONG_CONTEXT_MODEL:-gemma-4-26b-a4b-it}
  LONG_CONTEXT_TOKEN_THRESHOLD: ${LONG_CONTEXT_TOKEN_THRESHOLD:-8192}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
  RERANKER_MODEL: ${RERANKER_MODEL:-bge-reranker-v2-m3}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  BUTLER_LOG_MODE: verbose
  BUTLER_LOG_COLOR: "true"
  LOG_LEVEL: debug
  APP_ENV: development
  HOST: 0.0.0.0
  PORT: 8000
  WEB_CONCURRENCY: 2
  NODE_ID: api-dev-1

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
      cache_from:
        - type=local,src=/tmp/.buildx-cache
    image: butler-api:dev
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
      redpanda:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: /app/scripts/start-api.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8000/api/v1/health/live || exit 1",
        ]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  api-prod:
    profiles: [prod, ship]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    image: butler-api:prod
    environment:
      <<: *api-env
      BUTLER_LOG_MODE: ${BUTLER_LOG_MODE:-minimal}
      BUTLER_LOG_COLOR: "false"
      NO_COLOR: "1"
      LOG_LEVEL: INFO
      APP_ENV: production
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      NODE_ID: ${HOSTNAME:-prod-api-1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: /app/scripts/start-api.sh
    read_only: true
    tmpfs:
      - /tmp
      - /app/backend/scratch
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8000/api/v1/health/live || exit 1",
        ]
      <<: *hc-defaults
    logging: *logging-prod
    <<: *restart

  api-json:
    profiles: [ship]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    image: butler-api:prod
    environment:
      <<: *api-env
      BUTLER_LOG_MODE: json
      BUTLER_LOG_COLOR: "false"
      NO_COLOR: "1"
      LOG_LEVEL: INFO
      APP_ENV: production
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      NODE_ID: ${HOSTNAME:-prod-api-1}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      searxng:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: /app/scripts/start-api.sh
    read_only: true
    tmpfs:
      - /tmp
      - /app/backend/scratch
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8000/api/v1/health/live || exit 1",
        ]
      <<: *hc-defaults
    logging: *logging-prod
    <<: *restart

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: butler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-butler}
      POSTGRES_DB: butler
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=200
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_line_prefix=%t [%p] %u@%d
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U butler -d butler"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  cache:
    image: redis:7-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  neo4j:
    image: neo4j:5.12-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-butler-dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*,graph_data_science.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging: *logging-dev
    <<: *restart

  qdrant:
    image: qdrant/qdrant:v1.13.4
    environment:
      QDRANT__LOG_LEVEL: WARN
      QDRANT__TELEMETRY_DISABLED: "true"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/health || exit 1"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  searxng:
    image: searxng/searxng:latest
    container_name: butler-searxng
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-searxng-dev-secret}
      UWSGI_WORKERS: "4"
      UWSGI_THREADS: "4"
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || exit 1"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      <<: *hc-defaults
    logging: *logging-dev
    <<: *restart

  app:
    profiles: [frontend]
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      API_URL: http://api:8000
      NODE_ENV: development
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
      - app_expo_modules:/app/node_modules/@expo
    command: npx expo start --tunnel
    depends_on:
      api:
        condition: service_healthy
    logging: *logging-dev
    <<: *restart

  vector:
    profiles: [ship]
    image: timberio/vector:0.38-debian
    volumes:
      - ./deploy/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8686:8686"
    depends_on:
      - api-json
    logging: *logging-dev
    <<: *restart

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_data:
    driver: local
  app_node_modules:
    driver: local
  app_expo_modules:
    driver: local
  redpanda_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: butler-net
    driver: bridge
